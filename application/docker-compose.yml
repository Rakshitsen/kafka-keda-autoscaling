# ============================================================================
# Docker Compose: Local Development & Testing
# ============================================================================
# Start Kafka locally and test producer/consumer services.
# Usage:
#   docker-compose up -d
#   docker-compose logs -f producer consumer
#   docker-compose down
# ============================================================================

version: '3.9'

services:
  # Zookeeper (for KRaft, not needed; but kept for broker coordination in older setups).
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network

  # Kafka Broker (single node, for testing).
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_LOG_RETENTION_HOURS: 24
    networks:
      - kafka-network

  # Topic initialization (create topics before producer/consumer start).
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint:
      - /bin/sh
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --topic orders --partitions 3 --replication-factor 1 --if-not-exists
    networks:
      - kafka-network

  # Producer Service
  producer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      SERVICE: producer
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: orders
      MESSAGE_RATE_PER_SEC: "10"
      KAFKA_PRODUCER_BATCH_SIZE: "1000"
      KAFKA_PRODUCER_LINGER_MS: "100"
      KAFKA_COMPRESSION_TYPE: "snappy"
      LOG_LEVEL: "INFO"
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - kafka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Consumer Service
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      SERVICE: consumer
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: orders
      KAFKA_CONSUMER_GROUP: order-processors
      PROCESSING_DELAY_SECONDS: "0.1"
      LOG_LEVEL: "INFO"
      HTTP_PORT: "8081"
      HOSTNAME: consumer-1
    ports:
      - "8081:8081"
    networks:
      - kafka-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # (Optional) Kafka UI for monitoring (Redpanda Console).
  kafka-ui:
    image: redpandadata/console:latest
    depends_on:
      - kafka
    ports:
      - "8888:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge
