apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kafka-lag-so
  namespace: kafka
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: deployment
    name: kafka-consumer
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: my-cluster-kafka-bootstrap.kafka.svc:9092
      consumerGroup: order-processors
      topic: orders
      lagThreshold: "100"
      allowIdleConsumers: 'false'
      activationLagThreshold: '0'
