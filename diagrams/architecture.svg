<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f1f1f; }
      .label { font: 700 20px Arial, sans-serif; fill: #1f1f1f; }
      .small { font: 600 16px Arial, sans-serif; fill: #1f1f1f; }
      .tiny { font: 600 14px Arial, sans-serif; fill: #1f1f1f; }
      .box { rx: 16; ry: 16; stroke-width: 3; }
      .arrow { stroke-width: 4; fill: none; stroke: #455a64; marker-end: url(#arrowhead); }
      .purple { stroke: #8e24aa; }
      .orange { stroke: #ef6c00; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#455a64" />
    </marker>
  </defs>

  <rect x="40" y="40" width="1520" height="1120" fill="#ffffff" stroke="#1f1f1f" stroke-width="3"/>
  <text x="800" y="85" text-anchor="middle" class="title">Kubernetes Cluster</text>

  <!-- Main flow -->
  <rect class="box" x="110" y="150" width="250" height="90" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="235" y="200" text-anchor="middle" class="label">Producer Deployment</text>

  <rect class="box" x="455" y="140" width="420" height="120" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="665" y="180" text-anchor="middle" class="label">Kafka Cluster (Strimzi)</text>
  <text x="665" y="210" text-anchor="middle" class="small">Orders Topic</text>
  <text x="665" y="235" text-anchor="middle" class="small">Partitions</text>

  <rect class="box" x="980" y="150" width="250" height="90" fill="#f3e5f5" stroke="#6a1b9a"/>
  <text x="1105" y="200" text-anchor="middle" class="label">Consumer Deployment</text>

  <path class="arrow" d="M 360 195 L 455 195"/>
  <path class="arrow" d="M 875 195 L 980 195"/>

  <!-- Autoscaling loop -->
  <rect cx="1110" cy="355" class="box" x="1045" y="320" width="130" height="70" rx="35" ry="35" fill="#faf0ff" stroke="#8e24aa"/>
  <text x="1110" y="363" text-anchor="middle" class="label">KEDA</text>

  <rect x="1045" y="445" width="130" height="70" rx="35" ry="35" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
  <text x="1110" y="490" text-anchor="middle" class="label">HPA</text>

  <path class="arrow purple" d="M 1110 320 L 1110 240"/>
  <path class="arrow orange" d="M 1110 445 L 1110 390"/>

  <!-- Observability separator -->
  <line x1="80" y1="610" x2="1520" y2="610" stroke="#1f1f1f" stroke-width="3"/>
  <text x="80" y="640" class="label">Observability</text>

  <!-- Metrics -->
  <rect class="box" x="110" y="680" width="210" height="58" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="215" y="717" text-anchor="middle" class="small">Producer Metrics</text>

  <rect class="box" x="110" y="760" width="210" height="58" fill="#f3e5f5" stroke="#6a1b9a"/>
  <text x="215" y="797" text-anchor="middle" class="small">Consumer Metrics</text>

  <rect class="box" x="110" y="840" width="210" height="58" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="215" y="877" text-anchor="middle" class="small">Kafka Exporter</text>

  <rect class="box" x="110" y="920" width="210" height="58" fill="#faf0ff" stroke="#8e24aa"/>
  <text x="215" y="957" text-anchor="middle" class="small">KEDA Metrics</text>

  <rect class="box" x="110" y="1000" width="210" height="58" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="215" y="1037" text-anchor="middle" class="small">HPA Metrics</text>

  <rect class="box" x="520" y="825" width="240" height="88" fill="#eceff1" stroke="#37474f"/>
  <text x="640" y="870" text-anchor="middle" class="label">Prometheus</text>

  <rect class="box" x="550" y="960" width="180" height="78" fill="#eceff1" stroke="#37474f"/>
  <text x="640" y="1008" text-anchor="middle" class="label">Grafana</text>

  <path class="arrow" d="M 320 709 L 520 869"/>
  <path class="arrow" d="M 320 789 L 520 869"/>
  <path class="arrow" d="M 320 869 L 520 869"/>
  <path class="arrow" d="M 320 949 L 520 869"/>
  <path class="arrow" d="M 320 1029 L 520 869"/>
  <path class="arrow" d="M 640 913 L 640 960"/>

  <!-- Section labels -->
  <text x="235" y="270" text-anchor="middle" class="tiny">Producer</text>
  <text x="665" y="288" text-anchor="middle" class="tiny">Kafka data path</text>
  <text x="1105" y="270" text-anchor="middle" class="tiny">Consumer</text>
</svg>
